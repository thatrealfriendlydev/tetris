<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geo-Stack: It's Perfectly Legal!</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --gb-bg: #2a2a2a; --gb-screen: #1a1a1a; --gb-dark: #eee; --gb-accent: #555; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #111; display: flex; flex-direction: column; align-items: center; overflow: hidden; font-family: 'Press Start 2P', cursive; user-select: none; touch-action: none; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        marquee { width: 100%; background: #ff0000; color: white; padding: 10px 0; font-size: 10px; border-bottom: 4px solid #fff; position: absolute; top: 0; z-index: 1000;}

        #main-container { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; transition: all 0.1s; }

        /* VIP SHOP POPUP */
        .modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: linear-gradient(180deg, #ffd700, #b8860b); border: 6px solid #fff; padding: 20px; z-index: 2000; box-shadow: 0 0 100px rgba(0,0,0,0.9); text-align: center; }
        .modal h2 { color: #000; font-size: 14px; margin-bottom: 20px; }
        .buy-btn { background: #4caf50; color: white; border: 3px solid #2e7d32; padding: 10px; font-family: 'Press Start 2P'; font-size: 8px; cursor: pointer; display: block; width: 100%; margin: 10px 0; }
        .close-shop { background: #f44336; color: white; border: none; padding: 5px; font-family: 'Press Start 2P'; font-size: 8px; cursor: pointer; margin-top: 10px; }

        /* CONFIRM POPUP */
        #confirm-popup { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; background: #eee; border: 4px solid #000; padding: 15px; z-index: 3000; text-align: center; color: #000; font-size: 10px; }

        /* UI BUTTONS */
        #shop-trigger { position: absolute; top: 60px; right: 20px; background: #ffd700; border: 3px solid #fff; padding: 10px; font-size: 8px; cursor: pointer; animation: pulse 1s infinite; z-index: 500; }
        #daily-reward { position: absolute; bottom: 20px; right: 20px; background: #e91e63; color: white; padding: 15px; border: 4px solid #ad1457; font-size: 8px; cursor: pointer; z-index: 500; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 20% { transform: translate(-3px, 0px); } 40% { transform: translate(3px, 2px); } 60% { transform: translate(-3px, 1px); } 80% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -2px); } }

        #game-wrapper { position: relative; background-color: var(--gb-bg); padding: 2vh; border-radius: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); display: flex; gap: 2vh; border: 0.5vh solid #444; }
        canvas { background-color: var(--gb-screen); border: 0.4vh solid var(--gb-dark); image-rendering: pixelated; }
        #board-canvas { width: 240px; height: 400px; }
        
        .panel { display: flex; flex-direction: column; justify-content: space-between; width: 12vh; }
        .box { text-align: center; font-size: 8px; color: var(--gb-dark); }
        .box canvas { background: transparent; border: 0.2vh dashed var(--gb-accent); width: 8vh; height: 8vh; margin-top: 1vh; }
        #next-canvas { height: 300px; }
        .stats p { margin: 2vh 0; font-size: 8px; line-height: 1.6; color: var(--gb-dark); }
        #overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.9); z-index: 100; display: flex; justify-content: center; align-items: center; text-align: center; color: #fff; font-size: 10px; cursor: pointer;}
        #mobile-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 100%; max-width: 400px; padding: 10px; }
		.btn { background: #333; color: #eee; border: 2px solid #555; padding: 12px 5px; border-radius: 8px; font-family: 'Press Start 2P'; font-size: 8px; }
    </style>
</head>
<body>

<marquee scrollamount="8">WARNING: LACK OF DIAMOND PURCHASES DETECTED. PHYSICS STABILITY AT 42%. BUY THE "STABILITY PACK" FOR $14.99!</marquee>

<button id="shop-trigger" onclick="toggleShop(true)">✨ VIP SHOP ✨</button>

<div id="main-container">
    <div id="game-wrapper">
        <div id="overlay"><div><p>GEO-STACK</p><p>TAP TO START</p></div></div>
        <div class="panel">
            <div class="box">STASH<canvas id="hold-canvas" width="100" height="100"></canvas></div>
            <div class="stats">
                <p>BEST<br><span id="hi-score">0</span></p>
                <p>SCORE<br><span id="score">0</span></p>
                <p>LEVEL<br><span id="level">1</span></p>
            </div>
        </div>
        <canvas id="board-canvas" width="240" height="400"></canvas>
        <div class="panel">
            <div class="box">QUEUE<canvas id="next-canvas" width="100" height="300"></canvas></div>
        </div>
    </div>
</div>

<div id="shop-modal" class="modal">
    <h2>PREMIUM STORE</h2>
    <button class="buy-btn" onclick="askConfirm('REMOVE ADS')">REMOVE ADS $9.99</button>
    <button class="buy-btn" onclick="askConfirm('INSTANT WIN')">INSTANT WIN $99.99</button>
    <button class="buy-btn" onclick="askConfirm('NO GRAVITY')">NO GRAVITY $4.99</button>
    <button class="close-shop" onclick="toggleShop(false)">GO BACK (POOR)</button>
</div>

<div id="confirm-popup">
    <p id="confirm-msg"></p>
    <p>ARE YOU SURE?</p>
    <button class="buy-btn" onclick="window.open('https://www.youtube.com/watch?v=dQw4w9WgXcQ')">YES, BUY!</button>
    <button class="close-shop" onclick="document.getElementById('confirm-popup').style.display='none'">CANCEL</button>
</div>

<div id="daily-reward" onclick="breakPhysics()">CLAIM DAILY REWARD! 🎁</div>

<div id="mobile-controls">
    <button class="btn" id="m-left">LEFT</button>
    <button class="btn" id="m-rotate">ROTATE</button>
    <button class="btn" id="m-right">RIGHT</button>
    <button class="btn" id="m-hold">STASH</button>
    <button class="btn" id="m-down">SOFT</button>
    <button class="btn" style="background:#0066cc" id="m-drop">HARD</button>
</div>

<script>
const keys = {}; 
const SHAPES = { 1:[[1,1,1,1,1]], 2:[[0,2,0],[2,2,2],[0,2,0]], 3:[[3,3,0],[0,3,3],[0,0,3]], 4:[[4,0,0,0],[4,4,4,4]], 5:[[5,5,5],[5,0,5]], 6:[[0,6,6],[6,6,0],[0,6,0]], 7:[[7,7,7,7],[0,0,0,7]] };
const COLORS = { 1:'#FF5733', 2:'#33FF57', 3:'#3357FF', 4:'#F333FF', 5:'#33FFF3', 6:'#F3FF33', 7:'#FF3380' };

// NORMALIZED AUDIO LOGIC
const sfx = {
    bgm: new Audio('Spazzmatica Polka.mp3'),
    move: new Audio('move2.mp3'),
    place: new Audio('place.mp3'),
    clear: new Audio('clear sound.mp3'),
    multi: new Audio('multi line clear.mp3'),
    gameOver: new Audio('game over new.mp3')
};
sfx.bgm.loop = true;
sfx.bgm.volume = 1.0; 
sfx.move.volume = 0.15;
sfx.place.volume = 0.25;
sfx.clear.volume = 0.3;
sfx.multi.volume = 0.35;
sfx.gameOver.volume = 0.4;

let board = Array.from({length:20}, () => Array(12).fill(0));
let nextQueue = [], holdPiece = null, canHold = true, piece = null;
let score = 0, level = 1, lines = 0, gameState = 'START';
let dropCounter = 0, lastTime = 0, lockDelayCounter = 0;

const boardCtx = document.getElementById('board-canvas').getContext('2d');
const nextCtx = document.getElementById('next-canvas').getContext('2d');
const holdCtx = document.getElementById('hold-canvas').getContext('2d');

function toggleShop(show) { document.getElementById('shop-modal').style.display = show ? 'block' : 'none'; }
function askConfirm(item) {
    document.getElementById('confirm-msg').innerText = "PURCHASE: " + item;
    document.getElementById('confirm-popup').style.display = 'block';
}

function breakPhysics() {
    const body = document.body;
    const container = document.getElementById('main-container');
    body.style.transform = `rotate(${Math.random() * 10 - 5}deg) scale(0.9)`;
    container.style.animation = "shake 0.2s infinite";
    setTimeout(() => {
        container.style.animation = "";
        body.style.transform = "rotate(0deg) scale(1)";
    }, 2000);
    document.getElementById('daily-reward').style.top = Math.random() * 80 + "%";
    document.getElementById('daily-reward').style.left = Math.random() * 80 + "%";
}

function collides(shape, x, y) {
    for (let r = 0; r < shape.length; r++)
        for (let c = 0; c < shape[r].length; c++)
            if (shape[r][c]) {
                let nX = x + c, nY = y + r;
                if (nX < 0 || nX >= 12 || nY >= 20 || (nY >= 0 && board[nY] && board[nY][nX])) return true;
            }
    return false;
}

function move(dx, dy) {
    if (gameState !== 'PLAYING' || !piece) return false;
    if (!collides(piece.shape, piece.x + dx, piece.y + dy)) {
        piece.x += dx; piece.y += dy;
        if(dx !== 0) sfx.move.play().catch(()=>{});
        return true;
    }
    return false;
}

function rotate() {
    if (gameState !== 'PLAYING' || !piece) return;
    const nextS = piece.shape[0].map((_, i) => piece.shape.map(row => row[i])).reverse();
    if (!collides(nextS, piece.x, piece.y)) piece.shape = nextS;
}

function spawnPiece(type) {
    piece = { type, shape: SHAPES[type], x: 4, y: 0 };
    canHold = true;
    if (collides(piece.shape, piece.x, piece.y)) endGame();
}

function lockPiece() {
    piece.shape.forEach((row, r) => row.forEach((v, c) => { if (v) board[piece.y + r][piece.x + c] = piece.type; }));
    sfx.place.play().catch(()=>{});
    let cleared = 0;
    for(let y = 19; y >= 0; y--) {
        if(board[y].every(v => v !== 0)) { board.splice(y, 1); board.unshift(Array(12).fill(0)); cleared++; y++; }
    }
    if(cleared > 0) {
        cleared > 1 ? sfx.multi.play().catch(()=>{}) : sfx.clear.play().catch(()=>{});
        score += cleared * 150 * level; lines += cleared; level = Math.floor(lines/5)+1;
        if(Math.random() > 0.8) toggleShop(true); 
    }
    spawnPiece(nextQueue.length ? nextQueue.shift() : 1);
    if(nextQueue.length < 5) nextQueue.push(...[1,2,3,4,5,6,7].sort(() => Math.random() - 0.5));
    lockDelayCounter = 0;
}

function drawBlock(ctx, x, y, type) {
    ctx.fillStyle = COLORS[type];
    ctx.fillRect(x * 20, y * 20, 20, 20);
    ctx.strokeStyle = '#222'; ctx.strokeRect(x * 20, y * 20, 20, 20);
}

function draw() {
    boardCtx.clearRect(0,0,240,400);
    board.forEach((row, y) => row.forEach((v, x) => { if(v) drawBlock(boardCtx, x, y, v); }));
    if (piece && gameState === 'PLAYING') {
        piece.shape.forEach((row, r) => row.forEach((v, c) => { if (v) drawBlock(boardCtx, piece.x + c, piece.y + r, piece.type); }));
    }
    nextCtx.clearRect(0,0,100,300);
    nextQueue.slice(0,3).forEach((t, i) => {
        SHAPES[t].forEach((row, r) => row.forEach((v, c) => v && drawBlock(nextCtx, c+1, i*6+1+r, t)));
    });
    holdCtx.clearRect(0,0,100,100);
    if (holdPiece) SHAPES[holdPiece].forEach((row, r) => row.forEach((v, c) => v && drawBlock(holdCtx, c+1, 1+r, holdPiece)));
}

function startGame() {
    board = Array.from({length:20}, () => Array(12).fill(0));
    nextQueue = [1,2,3,4,5,6,7].sort(() => Math.random() - 0.5);
    score = 0; level = 1; lines = 0; holdPiece = null;
    document.getElementById('overlay').style.display = 'none';
    gameState = 'PLAYING'; spawnPiece(nextQueue.shift()); 
    sfx.bgm.play().catch(()=>{});
}

function endGame() {
    gameState = 'GAMEOVER'; sfx.bgm.pause(); sfx.gameOver.play().catch(()=>{});
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('overlay').innerHTML = '<div><p>OUT OF LIVES!</p><button class="buy-btn" onclick="askConfirm(\'EXTRA LIFE\')">BUY LIFE ($0.99)</button></div>';
}

function update(time = 0) {
    const dt = time - lastTime; lastTime = time;
    if (gameState === 'PLAYING' && piece) {
        dropCounter += dt;
        let spd = Math.max(100, 1000 - (level * 100));
        if (keys['ArrowDown']) spd = 50;
        if (dropCounter > spd) { if(!move(0, 1)) lockDelayCounter += 100; dropCounter = 0; }
        if (collides(piece.shape, piece.x, piece.y + 1)) {
            lockDelayCounter += dt;
            if (lockDelayCounter > 400) lockPiece();
        }
    }
    document.getElementById('score').innerText = score;
    document.getElementById('level').innerText = level;
    draw(); requestAnimationFrame(update);
}

window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (gameState !== 'PLAYING') return;
    if (e.key === 'ArrowLeft') move(-1,0); if (e.key === 'ArrowRight') move(1,0); if (e.key === 'ArrowUp') rotate();
    if (e.key === ' ') { while(move(0,1)); lockPiece(); }
    if (e.key === 'c' || e.key === 'Shift') { if (canHold && piece) { let t = piece.type; if(holdPiece) spawnPiece(holdPiece); else spawnPiece(nextQueue.shift()); holdPiece = t; canHold = false; } }
});
window.addEventListener('keyup', e => keys[e.key] = false);

const addMobile = (id, fn) => { document.getElementById(id).addEventListener('pointerdown', e => { e.preventDefault(); if(gameState !== 'PLAYING') startGame(); else fn(); }); };
addMobile('m-left', () => move(-1,0)); addMobile('m-right', () => move(1,0)); addMobile('m-rotate', () => rotate());
addMobile('m-hold', () => { if (canHold && piece) { let t = piece.type; holdPiece ? spawnPiece(holdPiece) : spawnPiece(nextQueue.shift()); holdPiece = t; canHold = false; } });
addMobile('m-drop', () => { while(move(0,1)); lockPiece(); });
document.getElementById('m-down').addEventListener('pointerdown', e => { keys['ArrowDown'] = true; });
document.getElementById('m-down').addEventListener('pointerup', e => { keys['ArrowDown'] = false; });
document.getElementById('overlay').addEventListener('pointerdown', () => { if(gameState === 'START' || gameState === 'GAMEOVER') startGame(); });

requestAnimationFrame(update);
</script>
</body>
</html>
